<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SnowPro Core 演習帳</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@700;900&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>

    <header class="top-bar">
      <div class="top-bar-inner">
        <div class="brand">
          <span class="brand-eyebrow">SnowPro Core</span>
          <span class="brand-name">演習帳</span>
        </div>

        <dl class="stat-strip">
          <div class="stat">
            <dt>回答済み</dt>
            <dd id="answered-count">0</dd>
          </div>
          <div class="stat">
            <dt>正答率</dt>
            <dd id="accuracy-rate">0%</dd>
          </div>
          <div class="stat">
            <dt>ブックマーク</dt>
            <dd id="bookmark-count">0</dd>
          </div>
          <div class="stat">
            <dt>全問</dt>
            <dd id="question-count">0</dd>
          </div>
        </dl>

        <details class="menu" id="menu-details">
          <summary aria-label="メニュー">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
              <circle cx="3" cy="8" r="1.5"/><circle cx="8" cy="8" r="1.5"/><circle cx="13" cy="8" r="1.5"/>
            </svg>
          </summary>
          <div class="menu-panel">
            <a class="menu-item" href="../../../apps/learning-hub/index.html">学習ノートへ</a>
            <hr />
            <button class="menu-item" id="export-progress-button" type="button">進捗をエクスポート</button>
            <button class="menu-item" id="import-progress-button" type="button">進捗をインポート</button>
            <input class="file-input-hidden" id="import-progress-file" type="file" accept="application/json,.json" />
            <hr />
            <button class="menu-item is-danger" id="reset-progress-button" type="button">このセットの進捗をリセット</button>
          </div>
        </details>
      </div>
      <div class="exam-progress" aria-hidden="true"><div id="q-progress-fill"></div></div>
    </header>

    <div class="page">

      <section class="control-deck">
        <nav class="exam-tabs" id="exam-tabs" aria-label="試験セット"></nav>

        <div class="toolbar">
          <div class="filter-list" id="filter-list"></div>
          <label class="search-box">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none" aria-hidden="true">
              <circle cx="5.5" cy="5.5" r="4" stroke="currentColor" stroke-width="1.4"/>
              <path d="M8.7 8.7L12 12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
            <input id="search-input" type="search" placeholder="キーワードで検索" />
          </label>
        </div>

        <div class="question-map" id="question-map"></div>
        <div class="map-legend" aria-hidden="true">
          <span class="lg lg-correct">正解</span>
          <span class="lg lg-wrong">要復習</span>
          <span class="lg lg-bookmark">ブックマーク</span>
          <span class="lg lg-current">表示中</span>
        </div>
      </section>

      <main class="desk">

        <article class="sheet question-sheet" id="question-sheet">
          <span class="sheet-side-label" aria-hidden="true">SnowPro Core 演習帳</span>

          <header class="q-head">
            <div class="q-number">
              <span class="q-mark">問</span>
              <span class="q-index" id="question-position">–</span>
              <span class="q-total" id="question-total">/ –</span>
            </div>
            <div class="q-flags">
              <span class="mode-badge" id="select-mode-badge">単一選択</span>
              <button class="bookmark-button" id="bookmark-button" type="button">
                <svg width="13" height="13" viewBox="0 0 14 14" fill="none" aria-hidden="true">
                  <path d="M2.5 2h9v10.5L7 9.5l-4.5 3V2z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
                </svg>
                <span>ブックマーク</span>
              </button>
            </div>
          </header>

          <div class="question-stem prose" id="question-stem"></div>

          <div class="options" id="options-list"></div>

          <div class="q-actions">
            <button class="primary-button" id="check-answer-button" type="button">
              採点する <kbd>↵</kbd>
            </button>
            <button class="ghost-button" id="toggle-explanation-button" type="button">解説を開く</button>
            <div class="nav-buttons">
              <button class="nav-button" id="prev-question-button" type="button" aria-label="前の問題へ">
                <svg width="13" height="13" viewBox="0 0 14 14" fill="none" aria-hidden="true">
                  <path d="M9 2.5L4.5 7 9 11.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                前へ
              </button>
              <button class="nav-button" id="next-question-button" type="button" aria-label="次の問題へ">
                次へ
                <svg width="13" height="13" viewBox="0 0 14 14" fill="none" aria-hidden="true">
                  <path d="M5 2.5L9.5 7 5 11.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>
            </div>
          </div>
        </article>

        <section class="sheet review-sheet" id="review-sheet" hidden>
          <div class="verdict-row">
            <div class="stamp" id="result-stamp">未採点</div>
            <dl class="verdict-lines">
              <div>
                <dt>あなたの選択</dt>
                <dd id="selected-answer-text">未選択</dd>
              </div>
              <div>
                <dt>正解</dt>
                <dd id="correct-answer-text">–</dd>
              </div>
            </dl>
          </div>

          <section class="review-block">
            <h2 class="review-heading">解説</h2>
            <div class="prose" id="explanation-content"></div>
          </section>

          <section class="review-block" id="practice-wrap" hidden>
            <h2 class="review-heading">実際に確認してみよう</h2>
            <div class="prose" id="practice-content"></div>
          </section>
        </section>

        <section class="desk-grid">
          <label class="sheet note-card">
            <span class="card-label">
              <svg width="12" height="12" viewBox="0 0 13 13" fill="none" aria-hidden="true">
                <rect x="1" y="1" width="11" height="11" rx="1.5" stroke="currentColor" stroke-width="1.2"/>
                <path d="M3.5 4.5h6M3.5 6.5h6M3.5 8.5h4" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
              </svg>
              学習メモ
            </span>
            <textarea id="user-note" rows="5" placeholder="なぜその選択肢にしたか、ひっかけに見えた点、あとで見返したい論点"></textarea>
          </label>

          <div class="sheet note-card">
            <span class="card-label">
              <svg width="12" height="12" viewBox="0 0 13 13" fill="none" aria-hidden="true">
                <circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.2"/>
                <path d="M6.5 4.5v3.5M6.5 9.5v.3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
              </svg>
              元ノートの回答メモ
            </span>
            <div class="source-answer" id="source-answer"></div>
          </div>
        </section>

      </main>

      <footer class="shortcut-bar" aria-hidden="true">
        <span><kbd>A</kbd>–<kbd>E</kbd> 選択</span>
        <span><kbd>↵</kbd> 採点</span>
        <span><kbd>Space</kbd> 解説</span>
        <span><kbd>←</kbd><kbd>→</kbd> 移動</span>
      </footer>
    </div>

    <script src="./questions-data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
