<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snowflake 学習ノート</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@700;900&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>

    <header class="top-bar">
      <div class="top-bar-inner">
        <button class="sidebar-toggle" id="sidebar-toggle" type="button" aria-label="サイドバーを開閉">
          <svg width="15" height="15" viewBox="0 0 17 17" fill="none" aria-hidden="true">
            <rect y="2.5" width="17" height="2" rx="1" fill="currentColor" />
            <rect y="7.5" width="17" height="2" rx="1" fill="currentColor" />
            <rect y="12.5" width="17" height="2" rx="1" fill="currentColor" />
          </svg>
        </button>

        <div class="brand">
          <span class="brand-eyebrow">Snowflake</span>
          <span class="brand-name">学習ノート</span>
        </div>

        <span id="current-article-title" class="visually-hidden"></span>

        <dl class="stat-strip">
          <div class="stat">
            <dt>学習済み章</dt>
            <dd id="completed-count">0</dd>
          </div>
          <div class="stat">
            <dt>ブックマーク</dt>
            <dd id="bookmark-count">0</dd>
          </div>
          <div class="stat">
            <dt>総章数</dt>
            <dd id="article-count">0</dd>
          </div>
          <div class="stat">
            <dt>現在位置</dt>
            <dd id="section-position">0/0</dd>
          </div>
        </dl>

        <details class="menu" id="menu-details">
          <summary aria-label="メニュー">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
              <circle cx="3" cy="8" r="1.5"/><circle cx="8" cy="8" r="1.5"/><circle cx="13" cy="8" r="1.5"/>
            </svg>
          </summary>
          <div class="menu-panel">
            <a class="menu-item" href="../../certifications/snowpro-associate/quiz_app/index.html">Associate 問題演習へ</a>
            <a class="menu-item" href="../../certifications/snowpro-core/quiz_app/index.html">Core 問題演習へ</a>
            <hr />
            <button class="menu-item is-danger" id="reset-progress-button" type="button">進捗をリセット</button>
          </div>
        </details>
      </div>
      <div class="exam-progress" aria-hidden="true"><div id="q-progress-fill"></div></div>
    </header>

    <div class="app-shell" id="app-shell">

      <aside class="side-rail">
        <label class="search-box">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none" aria-hidden="true">
            <circle cx="5.5" cy="5.5" r="4" stroke="currentColor" stroke-width="1.4"/>
            <path d="M8.7 8.7L12 12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          <input id="search-input" type="search" placeholder="章名・本文キーワード検索" />
        </label>

        <div class="filter-tabs" id="filter-tabs"></div>

        <section class="rail-block">
          <h2 class="rail-heading">章一覧</h2>
          <div class="article-list" id="article-list"></div>
        </section>

        <section class="rail-block">
          <h2 class="rail-heading">この章の見出し</h2>
          <div class="section-list" id="section-list"></div>
        </section>
      </aside>

      <main class="desk">

        <article class="sheet article-sheet" id="article-sheet">
          <span class="sheet-side-label" aria-hidden="true">Snowflake 学習ノート</span>

          <header class="a-head">
            <div class="a-head-top">
              <div class="a-number">
                <span class="a-mark">章</span>
                <span class="a-index" id="article-position">–</span>
              </div>
              <div class="a-flags">
                <span class="status-badge" id="status-badge">未学習</span>
                <button class="complete-button" id="toggle-complete-button" type="button">学習済みにする</button>
                <button class="bookmark-button" id="toggle-bookmark-button" type="button">
                  <svg width="13" height="13" viewBox="0 0 14 14" fill="none" aria-hidden="true">
                    <path d="M2.5 2h9v10.5L7 9.5l-4.5 3V2z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
                  </svg>
                  <span>ブックマーク</span>
                </button>
              </div>
            </div>
            <h1 class="a-title" id="article-heading">読み込み中...</h1>
          </header>

          <div class="article-content prose" id="article-content"></div>

          <div class="a-actions">
            <div class="nav-buttons">
              <button class="nav-button" id="prev-article-button" type="button">
                <svg width="13" height="13" viewBox="0 0 14 14" fill="none" aria-hidden="true">
                  <path d="M9 2.5L4.5 7 9 11.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                前の章
              </button>
              <button class="nav-button" id="next-article-button" type="button">
                次の章
                <svg width="13" height="13" viewBox="0 0 14 14" fill="none" aria-hidden="true">
                  <path d="M5 2.5L9.5 7 5 11.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>
            </div>
          </div>
        </article>

        <section class="desk-grid">
          <label class="sheet note-card">
            <span class="card-label">
              <svg width="12" height="12" viewBox="0 0 13 13" fill="none" aria-hidden="true">
                <rect x="1" y="1" width="11" height="11" rx="1.5" stroke="currentColor" stroke-width="1.2"/>
                <path d="M3.5 4.5h6M3.5 6.5h6M3.5 8.5h4" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
              </svg>
              学習メモ
            </span>
            <textarea id="user-note" rows="6" placeholder="曖昧な点、試験で引っかかりそうな論点、後で問題演習したいテーマ"></textarea>
          </label>

          <div class="sheet note-card">
            <span class="card-label">
              <svg width="12" height="12" viewBox="0 0 13 13" fill="none" aria-hidden="true">
                <path d="M5 8l3-3M4 6.5L2.5 8a2.1 2.1 0 003 3L7 9.5M9 6.5L10.5 5a2.1 2.1 0 00-3-3L6 3.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
              </svg>
              関連リンク
            </span>
            <div class="related-links" id="related-links">
              <a class="related-link" href="../../certifications/snowpro-associate/quiz_app/index.html">Associate 問題演習へ →</a>
              <a class="related-link" href="../../certifications/snowpro-core/quiz_app/index.html">Core 問題演習へ →</a>
              <a class="related-link" id="current-anchor-link" href="#top">この章の先頭へ ↑</a>
            </div>
          </div>
        </section>

        <footer class="shortcut-bar" aria-hidden="true">
          <span><kbd>←</kbd><kbd>→</kbd> 章移動</span>
          <span><kbd>C</kbd> 学習済みトグル</span>
          <span><kbd>B</kbd> ブックマーク</span>
        </footer>

      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script src="./notes-data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
