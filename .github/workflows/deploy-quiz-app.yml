name: Deploy study apps to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "certifications/snowpro-core/quiz_app/**"
      - "certifications/snowpro-associate/quiz_app/**"
      - "apps/learning-hub/**"
      - ".github/pages/**"
      - ".github/workflows/deploy-quiz-app.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site
        run: |
          mkdir -p _site/apps _site/certifications/snowpro-core _site/certifications/snowpro-associate
          mkdir -p _site/SnowPro_Core _site/SnowPro_Associate
          cp .github/pages/index.html _site/index.html
          cp -r apps/learning-hub _site/apps/learning-hub
          cp -r certifications/snowpro-core/quiz_app _site/certifications/snowpro-core/quiz_app
          cp -r certifications/snowpro-associate/quiz_app _site/certifications/snowpro-associate/quiz_app
          cp -r apps/learning-hub _site/app
          cp -r certifications/snowpro-core/quiz_app _site/SnowPro_Core/quiz_app
          cp -r certifications/snowpro-associate/quiz_app _site/SnowPro_Associate/quiz_app
          find _site -name "*.bak" -delete

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
